<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Jayantilal Narotamdas & Co.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .thankyou-container {
            background: #111111;
            border: 1px solid rgba(214, 175, 55, 0.3);
            border-top: 4px solid #d4af37;
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        /* Luxury elegant checkmark icon placeholder */
        .success-icon {
            width: 80px;
            height: 80px;
            border: 2px solid #d4af37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: #d4af37;
            font-size: 35px;
            font-family: 'Playfair Display', serif;
        }

        h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        p.message {
            color: #cccccc;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .divider {
            width: 50px;
            height: 1px;
            background-color: rgba(214, 175, 55, 0.3);
            margin: 0 auto 35px;
        }

        .home-btn {
            display: inline-block;
            background-color: #d4af37;
            color: #000000;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="thankyou-container">
        <div class="success-icon">✓</div>
        <h2>Thank You</h2>
        <p class="message">Your order request has been received securely. A member of the Jayantilal Narotamdas & Co. team will review your requirements and reach out to you shortly via Phone or WhatsApp.</p>
        
        <div class="divider"></div>
        
        <a href="index.html" class="home-btn">Return To Home</a>
    </div>

</body>
</html>
