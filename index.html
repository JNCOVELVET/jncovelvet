<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayantilal Narotamdas & Co.</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Unified Navigation Bar */
        .navbar {
            width: 100%;
            background-color: #080808;
            padding: 20px 0;
            border-bottom: 1px solid #1a1a1a;
            text-align: center;
        }

        .navbar a {
            color: #cccccc;
            text-decoration: none;
            margin: 0 20px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .navbar a:hover, .navbar a.active {
            color: #b89146;
        }

        /* Main Split Container */
        .container {
            display: flex;
            max-width: 1200px;
            width: 90%;
            gap: 50px;
            align-items: center;
            margin: auto 0; /* Centers vertically between nav and bottom */
            padding: 60px 0;
        }

        .left-content {
            flex: 1;
            text-align: left;
        }

        .right-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .sub-title {
            color: #b89146;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 20px 0;
            line-height: 1.1;
            font-weight: normal;
        }

        .description {
            color: #cccccc;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Sleek Live Pricing Box */
        .price-container {
            margin-bottom: 40px;
            border-left: 3px solid #b89146;
            padding-left: 15px;
        }

        .product-name {
            font-size: 0.9rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 1.8rem;
            color: #b89146;
            font-weight: bold;
        }

        .btn {
            background-color: #b89146;
            color: #0d0d0d;
            border: none;
            padding: 15px 45px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s ease;
            border-radius: 2px;
        }

        .btn:hover {
            background-color: #d4af37;
        }

        /* Slideshow Layout */
        .slideshow-container {
            max-width: 500px;
            width: 100%;
            position: relative;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .mySlides {
            display: none;
            width: 100%;
            height: 100%;
        }

        .mySlides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }

        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }

        /* Mobile Layout Shift */
        @media (max-width: 900px) {
            .container { flex-direction: column; text-align: center; padding: 40px 20px; box-sizing: border-box;}
            .left-content { text-align: center; width: 100%; }
            h1 { font-size: 2.5rem; }
            .price-container { border-left: none; padding-left: 0; margin: 0 auto 30px auto; }
            .btn { width: 100%; padding: 15px 0; box-sizing: border-box; }
            .slideshow-container { margin-top: 30px; }
            .navbar a { margin: 0 10px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">Our Story</a>
        <a href="contact.html">Contact</a>
        <a href="order.html">Place Order</a>
    </nav>

    <div class="container">
        
        <div class="left-content">
            <div class="sub-title">Established Excellence</div>
            <h1>Jayantilal Narotamdas & Co.</h1>
            <p class="description">
                A premium brand of quality velvets and the finest colours, containing every excellence you have dreamed of.
            </p>

            <div class="price-container">
                <div id="fabric-name" class="product-name">Premium Velvet</div>
                <div id="fabric-price" class="product-price">₹200 / metre</div>
            </div>

            <div>
                <a href="order.html" class="btn">Place an Order Now</a>
            </div>
        </div>

        <div class="right-content">
            <div class="slideshow-container">
                <div class="mySlides fade">
                    <img src="maroon.png" alt="Premium Velvet">
                </div>
                <div class="mySlides fade">
                    <img src="silver.png" alt="Starlight Platinum">
                </div>
                <div class="mySlides fade">
                    <img src="gold.png" alt="Royal Gilt Gold">
                </div>
                <div class="mySlides fade">
                    <img src="blue.png" alt="Luxury Blue Fur">
                </div>
            </div>
        </div>

    </div>

    <script>
        const fabricDetails = [
            { name: "Premium Velvet (Maroon)", price: "200" },
            { name: "Starlight Platinum (Silver)", price: "110" },
            { name: "Royal Gilt Gold", price: "110" },
            { name: "Luxury Blue Fur", price: "500" }
        ];

        let slideIndex = 0;
        showSlides();

        function showSlides() {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            
            document.getElementById("fabric-name").innerText = fabricDetails[slideIndex-1].name;
            document.getElementById("fabric-price").innerText = "₹" + fabricDetails[slideIndex-1].price + " / metre";

            setTimeout(showSlides, 3000); 
        }
    </script>

</body>
</html>
