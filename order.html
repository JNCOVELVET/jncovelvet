
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place an Order | Jayantilal Narotamdas & Co.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0b0b; color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .order-container { background: #111111; border: 1px solid rgba(214, 175, 55, 0.3); border-top: 4px solid #d4af37; padding: 40px; max-width: 600px; width: 100%; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h2 { font-family: 'Playfair Display', Georgia, serif; font-size: 2rem; color: #ffffff; margin-bottom: 10px; text-align: center; letter-spacing: 1px; }
        p.subtitle { color: #a0a0a0; font-size: 14px; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #d4af37; margin-bottom: 8px; font-weight: 600; }
        input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333333; padding: 12px 15px; color: #ffffff; border-radius: 4px; font-size: 15px; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }
        .submit-btn { width: 100%; background-color: #d4af37; color: #000000; border: none; padding: 16px; border-radius: 4px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
        .submit-btn:hover { background-color: #ffffff; transform: translateY(-2px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888888; text-decoration: none; font-size: 13px; }
        .back-link:hover { color: #d4af37; }
    </style>
</head>
<body>

    <div class="order-container">
        <h2>Order Request</h2>
        <p class="subtitle">Specify your velvet requirements below. Submitting will send your details directly to our sales desk.</p>
        
        <form action="https://formsubmit.co/jncovelvet@gmail.com" method="POST">
            
            <input type="hidden" name="_subject" value="New Premium Velvet Order Request">
            <input type="hidden" name="_next" value="https://jncovelvet.github.io/jncovelvet/thankyou.html">
            <input type="hidden" name="_captcha" value="false">

            <div class="form-group">
                <label>Your Full Name</label>
                <input type="text" name="Customer Name" placeholder="E.g., Rajesh Kumar" required>
            </div>

            <div class="form-group">
                <label>Phone / WhatsApp Number</label>
                <input type="tel" name="Phone Number" placeholder="E.g., +91 98211 63124" required>
            </div>

            <div class="form-group">
                <label>Full Delivery Address</label>
                <textarea name="Shipping Address" rows="3" placeholder="Flat/Shop No, Building Name, Street, City, State, Pincode" required></textarea>
            </div>

            <div class="form-group">
                <label>Velvet Fabric Type / Color</label>
                <select name="Fabric Choice" required>
                    <option value="" disabled selected>Select a fabric...</option>
                    <option value="Premium Shaggy Blue Velvet">Premium Shaggy Blue Velvet</option>
                    <option value="Royal Sapphire Blue">Royal Sapphire Blue</option>
                    <option value="Deep Burgundy Velvet">Deep Burgundy Velvet</option>
                    <option value="Emerald Green Crushed Velvet">Emerald Green Crushed Velvet</option>
                    <option value="Ferozi Velvet">Ferozi Velvet</option>
                    <option value="Coffee Velvet">Coffee Velvet</option>
                    <option value="Pink Velvet">Pink Velvet</option>
                    <option value="Lemon Velvet">Lemon Velvet</option>
                    <option value="Black Velvet">Black Velvet</option>
                    <option value="Rust Velvet">Rust Velvet</option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantity Required (in Meters)</label>
                <input type="number" name="Quantity (Meters)" min="1" placeholder="E.g., 10" required>
            </div>

            <div class="form-group">
                <label>Special Instructions</label>
                <textarea name="Special Instructions" rows="3" placeholder="Any specific requirements..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Order Request</button>
        </form>

        <a href="index.html" class="back-link">← Return to Homepage</a>
    </div>

</body>
</html>
